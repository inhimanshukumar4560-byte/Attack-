<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Chat Button</title>
    <style>
        /* Button ka design (CSS) */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }

        .whatsapp-button {
            display: inline-flex;
            align-items: center;
            background-color: #25D366; /* WhatsApp ka official green color */
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease-in-out;
        }

        /* Hover effect (Jab mouse upar layenge tab kaisa dikhega) */
        .whatsapp-button:hover {
            background-color: #128C7E; /* Thoda dark green */
            box-shadow: 0 6px 15px rgba(18, 140, 126, 0.5);
            transform: translateY(-2px);
        }

        /* WhatsApp icon styling */
        .whatsapp-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <!-- WhatsApp Link -->
    <!-- Note: Message ko URL Encode kiya gaya hai taaki spaces aur new lines theek se kaam karein -->
    <a href="https://wa.me/917390928912?text=Hello%20%F0%9F%91%8B%0AI%20came%20across%20your%20ad%20and%20I%E2%80%99m%20interested.%0ACan%20you%20please%20share%20more%20details%20about%20your%20service%20and%20pricing%3F" 
       class="whatsapp-button"
